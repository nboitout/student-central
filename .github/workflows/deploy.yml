name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]

env:
  REGISTRY: studentcentralregistry.azurecr.io
  IMAGE_NAME: student-central-api
  CONTAINER_APP_NAME: student-central-api
  RESOURCE_GROUP: student-central-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: studentcentralregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            studentcentralregistry.azurecr.io/student-central-api:latest
            studentcentralregistry.azurecr.io/student-central-api:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: studentcentralregistry.azurecr.io/student-central-api:${{ github.sha }}
